<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {{- if .IsHome }}
  <title>{{ .Site.Title }}</title>
  {{- else }}
  <title>{{ .Title | default .Site.Title }}</title>
  {{- end }}
  <meta name="author" content="{{ .Site.Params.author.name }}"/>
  {{- with .Site.Params.favicon }}
  <link rel='icon' type='image/x-icon' href="{{ . | relURL }}" />
  {{- end }}

  {{ .Hugo.Generator }}
  {{- if .RSSLink }}
  <link href="{{ .RSSLink | relURL }}" rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" />
  <link href="{{ .RSSLink | relURL }}" rel="feed" type="application/rss+xml" title="{{ .Site.Title }}" />
  {{- end }}
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}" media="all" />
  <link rel="stylesheet" href="{{ "css/syntax.css" | relURL }}" media="all" />
  <link rel="stylesheet" href="{{ "css/custom.css?v=3" | relURL }}" media="all" />

  <script
    src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous"
  ></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/js/all.min.js" integrity="sha512-6BTOlkauINO65nLhXhthZMtepgJSghyimIalb+crKRPhvhmsCdnIuGcVbR5/aQY2A+260iC1OPy1oCdB6pSSwQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
