
{{- with .Site.Params.author }}
  <ul class="author-social">
    <li><a href="https://notebooks.oranlooney.com" target="_blank" title="Jupyter Notebooks"><i class="fa-regular fa-lightbulb"></i></a></li>
    {{- with .linkedin }}
    <li><a href="https://linkedin.com/in/{{ . }}" target="_blank" title="LinkedIn"><i class="fa-brands fa-linkedin"></i></a></li>
    {{- end }}
    {{- with .github }}
    <li><a href="https://github.com/{{ . }}" target="_blank"  title="github"><i class="fa-brands fa-github"></i></a></li>
    {{- end }}
    {{- with .stackoverflow }}
    <li><a href="https://stackoverflow.com/users/{{ . }}" target="_blank" title="StackOverflow"><i class="fa-brands fa-stack-overflow"></i></a></li>
    {{- end }}
    {{- with .crossvalidated }}
    <li><a href="https://stats.stackexchange.com/users/{{ . }}" target="_blank" title="CrossValidated"><i class="fa-solid fa-flask"></i></a></li>
    {{- end }}
  </ul>
{{- end }}
