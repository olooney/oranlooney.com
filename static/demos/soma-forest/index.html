<!DOCTYPE html>
<html>
<head>
    <title>Soma Cube Forest</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        #soma-cube-forest {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="soma-cube-forest">
    </div>
    <script type="module">
        import { renderSomaCubeForest } from './soma_cube_forest.js';
        import { loadJSON } from './loader.js';


        Promise.all([
            loadJSON('positions.json'),
            loadJSON('solutions.json')
        ]).then(([positions, solutions]) => {
            renderSomaCubeForest(positions, solutions, 'soma-cube-forest');
        }).catch(error => {
            console.error('Failed to load JSON:', error);
        });


    </script>
</body>
</html>
