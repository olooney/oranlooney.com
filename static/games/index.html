<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Directory</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 80%; /* Adjust the width as needed */
            max-width: 800px;
            margin: 32px auto; /* Horizontally center the grid */
        }

        .grid-item {
            text-align: center;
            border: 2px solid #ccc;
            border-radius: 10px;
            padding: 5px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .grid-item img {
            width: 192px;
            height: 160px;
            object-fit: contain;
            border-radius: 10px;
            display: inline-block;
        }

        .grid-item p {
            margin: 2px;
            font-size: 1.1em;
        }

        .grid-item:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        header {
            width: 100%;
            background: #800000;
        }

        header nav {
            text-align: center;
            padding: 0.8em;
        }

        .site-title {
            color: white;
            text-decoration: none;
            font-family: garamond, "Times New Roman", serif;
            font-size: 44px;
            line-height: 50px;
            display: inline-block;
        }

        .site-footer {
            margin-top: auto;
            width: 100%;
            background-color: #f8f8f8;
            text-align: center;
            padding: 10px 0;
            border-top: 1px solid #ccc;
        }

        .copyright {
            font-size: 0.9em;
            color: #666;
        }


    </style>
</head>
<body>
    <header>
      <nav>
        <a href="/" class="site-title">OWL</a>
      </nav>
    </header>
    <div class="grid-container">
        <div class="grid-item">
            <a href="barchart/">
                <img src="barchart/lead.png" alt="Barchart Thumbnail">
                <p>Three.js Barchart</p>
            </a>
        </div>
        <div class="grid-item">
            <a href="design-elements/">
                <img src="design-elements/lead.png" alt="Design Elements Thumbnail">
                <p>Design Elements</p>
            </a>
        </div>
        <div class="grid-item">
            <a href="desktop/">
                <img src="desktop/lead.png" alt="ExtJS Desktop Thumbnail">
                <p>ExtJS Desktop</p>
            </a>
        </div>
        <div class="grid-item">
            <a href="euclid_37/">
                <img src="euclid_37/lead.png" alt="Euclid 37 Thumbnail">

            </a>
        </div>
        <div class="grid-item">
            <a href="font-wars/">
                <img src="font-wars/lead.png" alt="Font Wars Thumbnail">
                <p>Font Wars</p>
            </a>
        </div>
        <!--
        <div class="grid-item">
            <a href="glados/">

            </a>
        </div>
        -->

            </a>
        </div>
        <div class="grid-item">
            <a href="torus/">
                <img src="torus/lead.png" alt="Playfair Torus Thumbnail">

            </a>
        </div>

            </a>
        </div>

        <div class="grid-item">
            <a href="word-graph/">

                <p>Word Graph</p>
            </a>
        </div>
        <div class="grid-item">
            <a href="rose/">
                <img src="rose/lead.png" alt="Petals Around the Rose Thumbnail">
                <p>Petals Around the Rose</p>
            </a>
        </div>
        <div class="grid-item">
            <a href="soma-forest/">

            </a>
        </div>

            <a href="z5/">

    <div class="site-footer">
      <div class="copyright">

      </div>
    </div>
</body>
</html>
